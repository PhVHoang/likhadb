services:
  likhadb:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - likhadb-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  likhadb-data:
